name: Bot_SCM_Otomatis_Update

on:
  schedule:
    - cron: '0 * * * *' # Berjalan setiap 1 jam
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome (tanpa ChromeDriver)
        uses: browser-actions/setup-chrome@latest
        with:
          install-chromedriver: false
      # ChromeDriver akan otomatis di-download oleh Selenium Manager
      # yang sudah built-in di Selenium 4.6+, sehingga versi selalu sinkron

      - name: Verify Chrome
        run: |
          echo "--- Chrome Version ---"
          google-chrome --version || chrome --version

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests selenium openpyxl PyGithub

      - name: Run Bot SCM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EMAIL_SCM: ${{ secrets.EMAIL_SCM }}
          PASS_SCM: ${{ secrets.PASS_SCM }}
        run: python bot_scm.py
