name: Bot_SCM_Otomatis_Update

on:
  schedule:
    - cron: '0 * * * *' # Berjalan setiap 1 jam
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Menginstal Chrome versi terbaru dan memastikan driver selaras
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          install-chromedriver: true

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Menambahkan webdriver-manager untuk membantu sinkronisasi versi
          pip install requests selenium undetected-chromedriver openpyxl PyGithub webdriver-manager

      - name: Jalankan Script Bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EMAIL_SCM: ${{ secrets.EMAIL_SCM }}
          PASS_SCM: ${{ secrets.PASS_SCM }}
        run: python bot_scm.py
